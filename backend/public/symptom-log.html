<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>症状メモ - よりそい アラジール</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
  <link rel="stylesheet" href="/css/alagille-family.css">
  <style>
    .tool-card { padding: 15px; margin-bottom: 13px; background: linear-gradient(135deg,#fffdf8,#f0fbf8); }
    .lead { margin: 0; color: var(--ink-soft); font-size: 13px; line-height: 1.7; font-weight: 780; }
    .field { display: grid; gap: 6px; margin-bottom: 11px; color: #6a5a49; font-size: 13px; font-weight: 900; }
    input, textarea { width: 100%; border: 1.5px solid #e4ddd5; border-radius: 13px; background: #fffdfa; color: var(--ink); font: inherit; font-size: 14px; font-weight: 800; padding: 10px 11px; outline: none; }
    textarea { min-height: 78px; resize: vertical; line-height: 1.6; }
    input:focus, textarea:focus { border-color: var(--mint-line); box-shadow: 0 0 0 3px rgba(142,219,210,.22); }
    .save-btn { width: 100%; min-height: 49px; border: none; border-radius: 16px; background: var(--mint); color: #fff; font: inherit; font-size: 14px; font-weight: 900; display: inline-flex; align-items: center; justify-content: center; gap: 7px; box-shadow: 0 10px 18px rgba(29,169,157,.18); }
    .list { display: grid; gap: 9px; margin-top: 13px; }
    .item { padding: 12px 13px; }
    .item strong { display: block; font-size: 15px; color: var(--ink); line-height: 1.45; }
    .item span { display: block; margin-top: 3px; color: var(--ink-soft); font-size: 12px; line-height: 1.55; font-weight: 760; }
    .empty { padding: 14px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.7; font-weight: 760; }
  </style>
</head>
<body>
  <main class="app no-tabbar">
    <header class="screen-head">
      <a class="round" href="/simple/settings.html?disease=alagille" aria-label="戻る"><span class="material-symbols-outlined">arrow_back</span></a>
      <h1 class="screen-title">症状メモ</h1>
      <a class="round" href="/?disease=alagille" aria-label="ホーム"><span class="material-symbols-outlined">home</span></a>
    </header>
    <section class="panel tool-card"><p class="lead">かゆみ、食欲、睡眠など、日々の変化を短く残せます。</p></section>
    <section class="panel tool-card" aria-label="記録を追加">
      <label class="field"><span>気になること</span><input id="name" type="text" placeholder="例：夜のかゆみ"></label>
<label class="field"><span>程度・時間</span><input id="value" type="text" placeholder="例：寝る前に強い"></label>
<label class="field"><span>メモ</span><textarea id="memo" placeholder="食事、睡眠、園や学校での様子"></textarea></label>

      <button class="save-btn" id="save-btn" type="button"><span class="material-symbols-outlined">add_circle</span>記録する</button>
    </section>
    <section id="list" class="list" aria-live="polite"></section>
  </main>
  <script>
    const STORAGE_KEY = "alagille_symptoms_v1";
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("save-btn").addEventListener("click", saveItem);
      renderList();
    });
    function saveItem() {
      const name = document.getElementById("name").value.trim();
      const value = document.getElementById("value") ? document.getElementById("value").value.trim() : document.getElementById("dose").value.trim();
      const memo = document.getElementById("memo").value.trim();
      if (!name && !value && !memo) { alert("少しだけ入力してください"); return; }
      const saved = getItems();
      saved.unshift({ id: Date.now(), date: new Date().toISOString().slice(0,10), name, value, memo });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved.slice(0, 30)));
      ["name","value","dose","memo"].forEach((id) => { const el = document.getElementById(id); if (el) el.value = ""; });
      renderList();
    }
    function getItems() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; } }
    function renderList() {
      const items = getItems();
      const list = document.getElementById("list");
      if (!items.length) { list.innerHTML = '<div class="panel empty">まだ記録はありません。</div>'; return; }
      list.innerHTML = items.slice(0, 8).map((item) => `<article class="panel item"><strong>${escapeHtml(item.name || "記録")}</strong><span>${escapeHtml(item.date)}　${escapeHtml(item.value || "")}</span>${item.memo ? `<span>${escapeHtml(item.memo)}</span>` : ""}</article>`).join("");
    }
    function escapeHtml(str) { const d = document.createElement("div"); d.textContent = str || ""; return d.innerHTML; }
  </script>
</body>
</html>
