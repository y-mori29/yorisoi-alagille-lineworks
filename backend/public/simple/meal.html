<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ごはんメモ - よりそい</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />
  <style>
    body { background: var(--gray-50); padding: 0; }
    .page-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--brand-500), var(--brand-600));
      color: var(--white);
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn { background: none; border: none; color: var(--white); font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .page-header h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; }

    .intro {
      padding: 14px 20px 8px; font-size: 12.5px; color: var(--gray-600); line-height: 1.6;
    }
    .shoot-area {
      padding: 8px 20px 16px;
    }
    .shoot-btn {
      width: 100%; padding: 28px 18px;
      background: var(--brand-500); color: #fff;
      border: none; border-radius: 20px;
      font-size: 18px; font-weight: 700; letter-spacing: 2px;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      box-shadow: 0 6px 20px rgba(244,167,176,0.45);
      cursor: pointer;
    }
    .shoot-btn:active { transform: scale(0.98); }
    .shoot-btn .material-symbols-outlined { font-size: 30px; }
    .shoot-btn.busy { opacity: 0.6; pointer-events: none; }

    .hint {
      text-align: center; font-size: 11.5px; color: var(--gray-500); margin-top: 8px;
    }

    .grid-area { padding: 12px 16px 80px; }
    .grid-title { font-size: 13px; font-weight: 700; color: var(--gray-600); margin: 8px 4px 10px; letter-spacing: 1px; }
    .grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
    }
    .cell {
      position: relative; aspect-ratio: 1/1; background: var(--gray-100);
      border-radius: 10px; overflow: hidden; cursor: pointer;
    }
    .cell img { width: 100%; height: 100%; object-fit: cover; }
    .cell .date {
      position: absolute; left: 4px; bottom: 4px; right: 4px;
      font-size: 10px; color: #fff; background: rgba(0,0,0,0.55);
      padding: 2px 6px; border-radius: 6px; line-height: 1.4;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
    .empty {
      padding: 60px 24px; text-align: center; color: var(--gray-500);
      background: #fff; border: 1.5px dashed var(--gray-300);
      border-radius: 16px;
    }
    .empty .material-symbols-outlined {
      font-size: 48px; color: var(--gray-300); display: block; margin: 0 auto 8px;
    }

    /* 拡大表示 */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center; z-index: 1000;
      flex-direction: column; padding: 20px;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 100%; max-height: 70vh; border-radius: 12px; }
    .lightbox .meta { color: #fff; margin-top: 12px; text-align: center; font-size: 13px; line-height: 1.6; }
    .lightbox .actions { display: flex; gap: 10px; margin-top: 12px; }
    .lightbox .btn {
      padding: 10px 18px; border-radius: 22px; font-size: 13px; font-weight: 700;
      border: none; cursor: pointer;
    }
    .lightbox .btn-close { background: rgba(255,255,255,0.2); color: #fff; }
    .lightbox .btn-delete { background: #dc2626; color: #fff; }

    .gentle-note {
      margin: 14px 20px 24px;
      padding: 10px 14px;
      background: #ecfeff; border: 1px solid #cffafe;
      border-radius: 12px;
      font-size: 11.5px; color: #155e75; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <button class="back-btn" onclick="location.href='/' + (location.search || '')">&larr;</button>
    <h1>ごはんメモ</h1>
  </div>

  <p class="intro">撮るだけで OK。<br>体調がよくない時に、数日前のごはんを見返せます。</p>

  <div class="shoot-area">
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none;">
    <button class="shoot-btn" id="shoot-btn">
      <span class="material-symbols-outlined">photo_camera</span>ごはんを撮る
    </button>
    <p class="hint" id="shoot-hint">タップしてカメラ起動。アルバムからも選べます。</p>
  </div>

  <div class="grid-area">
    <div class="grid-title" id="grid-title">これまでのごはん</div>
    <div id="grid-content"></div>
  </div>

  <div class="gentle-note">
    気が向いた時だけ撮れば大丈夫です。<br>
    分類もタイトルも要りません。後でAIに「最近何食べた？」と聞けます。
  </div>

  <!-- 拡大表示 -->
  <div class="lightbox" id="lightbox">
    <img id="lb-img" src="" alt="">
    <div class="meta" id="lb-meta"></div>
    <div class="actions">
      <button class="btn btn-close" id="lb-close">閉じる</button>
      <button class="btn btn-delete" id="lb-delete">削除する</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script>
    let meals = [];
    let currentLightboxId = null;

    document.addEventListener("DOMContentLoaded", async () => {
      try { await initLiff(); } catch (_) {}
      await reloadMeals();
      bindEvents();
    });

    function bindEvents() {
      const fileInput = document.getElementById("file-input");
      document.getElementById("shoot-btn").addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", onFileChosen);
      document.getElementById("lb-close").addEventListener("click", () => closeLightbox());
      document.getElementById("lb-delete").addEventListener("click", () => deleteCurrent());
      document.getElementById("lightbox").addEventListener("click", (e) => {
        if (e.target.id === "lightbox") closeLightbox();
      });
    }

    async function reloadMeals() {
      try {
        const res = await fetch("/api/meals?limit=120");
        const data = await res.json();
        meals = data.items || [];
        renderGrid();
      } catch (e) {
        document.getElementById("grid-content").innerHTML = `<div class="empty">読み込みに失敗しました</div>`;
      }
    }

    function renderGrid() {
      const wrap = document.getElementById("grid-content");
      if (!meals.length) {
        wrap.innerHTML = `
          <div class="empty">
            <span class="material-symbols-outlined">restaurant</span>
            まだ写真がありません。<br>気が向いた時に撮ってみてください。
          </div>`;
        return;
      }
      wrap.innerHTML = `<div class="grid">` + meals.map(m => `
        <div class="cell" data-id="${m.id}">
          <img src="${m.image}" alt="">
          <div class="date">${formatDate(m.takenAt)}</div>
        </div>
      `).join("") + `</div>`;
      wrap.querySelectorAll(".cell").forEach(c => {
        c.addEventListener("click", () => openLightbox(c.dataset.id));
      });
    }

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        const m = d.getMonth() + 1;
        const day = d.getDate();
        const h = String(d.getHours()).padStart(2, "0");
        const mi = String(d.getMinutes()).padStart(2, "0");
        return `${m}/${day} ${h}:${mi}`;
      } catch (e) { return ""; }
    }

    function openLightbox(id) {
      const m = meals.find(x => x.id === id);
      if (!m) return;
      currentLightboxId = id;
      document.getElementById("lb-img").src = m.image;
      document.getElementById("lb-meta").textContent = formatDate(m.takenAt) + (m.note ? "  " + m.note : "");
      document.getElementById("lightbox").classList.add("show");
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("show");
      currentLightboxId = null;
    }

    async function deleteCurrent() {
      if (!currentLightboxId) return;
      if (!confirm("この写真を削除しますか？")) return;
      try {
        await fetch("/api/meals/" + currentLightboxId, { method: "DELETE" });
        closeLightbox();
        await reloadMeals();
      } catch (e) {
        alert("削除に失敗しました: " + (e.message || e));
      }
    }

    async function onFileChosen(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const btn = document.getElementById("shoot-btn");
      const hint = document.getElementById("shoot-hint");
      btn.classList.add("busy");
      hint.textContent = "保存しています…";

      try {
        // 1.5MB を超えるなら縮小
        const dataUri = await fileToResizedDataUri(file, 1280, 0.85);
        const res = await fetch("/api/meals", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: dataUri }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        await reloadMeals();
        hint.textContent = "保存しました";
        setTimeout(() => { hint.textContent = "タップしてカメラ起動。アルバムからも選べます。"; }, 1500);
      } catch (err) {
        hint.textContent = "保存に失敗：" + (err.message || err);
      } finally {
        btn.classList.remove("busy");
        e.target.value = "";
      }
    }

    function fileToResizedDataUri(file, maxSide, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const r = Math.min(1, maxSide / Math.max(img.width, img.height));
            const w = Math.round(img.width * r);
            const h = Math.round(img.height * r);
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
